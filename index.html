<!DOCTYPE html>
<html lang="fr">
<head>

    <div class="topbar-right">
      <select id="referentiel-select" class="ref-select">
        <option value="syscohada">SYSCOHADA Revise</option>

      <span class="topbar-meta" id="clock"></span>

  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="nav-section">
        <div class="nav-heading">Navigation</div>
        <button class="nav-btn active" data-tab="dashboard">Tableau de bord</button>

      <div class="nav-section">
        <div class="nav-heading">Outils</div>
        <button class="nav-btn" data-tab="saisie">Saisie ecriture</button>
        <button class="nav-btn" data-tab="cloture">Cloture exercice</button>
        <button class="nav-btn" data-tab="dsf">Declaration DSF/DGI</button>
      </div>
      <div class="nav-section">
        <div class="nav-heading">Reference</div>
        <button class="nav-btn" data-tab="guide">Guide OHADA</button>
        <button class="nav-btn" data-tab="comparaison">SYSCOHADA vs SYCEBNL</button>
      </div>

    <main class="main" id="main-content"></main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>

</html>
